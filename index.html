<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Spin the Wheel</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:      #e74c3c;
      --red-soft: rgba(231,76,60,0.12);
      --bg:       #f2f2f7;
      --card:     #ffffff;
      --border:   #e5e5ea;
      --text:     #1c1c1e;
      --muted:    #8e8e93;
      --sidebar:  240px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-text-size-adjust: 100%;
    }

    button { cursor: pointer; -webkit-tap-highlight-color: transparent; font-family: inherit; }
    input  { -webkit-appearance: none; font-family: inherit; }
    [hidden] { display: none !important; }

    /* ═══════════════════════════════
       LOGIN
    ═══════════════════════════════ */
    #loginScreen {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px 20px;
    }
    .login-card {
      background: var(--card); border-radius: 20px;
      padding: 36px 28px; width: 100%; max-width: 360px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .login-logo { font-size: 2rem; margin-bottom: 8px; }
    .login-card h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 4px; }
    .login-sub { font-size: 0.88rem; color: var(--muted); margin-bottom: 24px; }

    .tab-row {
      display: flex; background: var(--bg);
      border-radius: 10px; padding: 3px; margin-bottom: 20px;
    }
    .tab-row button {
      flex: 1; padding: 8px; font-size: 0.88rem; font-weight: 600;
      border: none; background: transparent; color: var(--muted); border-radius: 8px;
      transition: background .15s, color .15s;
    }
    .tab-row button.active {
      background: var(--card); color: var(--text);
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }
    .form-group { margin-bottom: 12px; }
    .form-group label {
      display: block; font-size: 0.78rem; font-weight: 600;
      color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 5px;
    }
    .form-group input {
      width: 100%; padding: 11px 13px;
      border: 1.5px solid var(--border); border-radius: 10px;
      font-size: 0.95rem; outline: none; background: var(--bg);
      transition: border-color .15s, background .15s;
    }
    .form-group input:focus { border-color: var(--red); background: white; }
    .auth-error { font-size: 0.83rem; color: var(--red); min-height: 1.1em; margin-bottom: 10px; }
    .btn-primary {
      width: 100%; padding: 13px; font-size: .95rem; font-weight: 700;
      background: var(--red); color: white; border: none; border-radius: 11px;
      box-shadow: 0 3px 12px rgba(231,76,60,.3); transition: opacity .15s;
    }
    .btn-primary:active { opacity: .8; }

    /* ═══════════════════════════════
       APP LAYOUT
    ═══════════════════════════════ */
    #appScreen {
      display: none;
      height: 100vh;
      overflow: hidden;
    }

    /* Desktop: sidebar + main side-by-side */
    @media (min-width: 700px) {
      #appScreen { display: none; flex-direction: row; }
      #appScreen.visible { display: flex !important; }
      #overlay { display: none !important; }
      #hamburger { display: none !important; }
      #sidebar { transform: none !important; position: relative !important; }
    }

    @media (max-width: 699px) {
      #appScreen.visible { display: flex !important; flex-direction: column; height: 100vh; }
    }

    /* ═══════════════════════════════
       SIDEBAR
    ═══════════════════════════════ */
    #overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.35); z-index: 40;
    }
    #overlay.show { display: block; }

    #sidebar {
      width: var(--sidebar);
      flex-shrink: 0;
      background: var(--card);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden;
      /* Mobile: drawer */
      position: fixed; top: 0; left: 0; bottom: 0;
      z-index: 50;
      transform: translateX(-100%);
      transition: transform .25s cubic-bezier(.4,0,.2,1);
    }
    #sidebar.open { transform: translateX(0); }

    .sb-header {
      padding: 18px 16px 14px;
      border-bottom: 1px solid var(--border);
    }
    .sb-app-name { font-size: 1rem; font-weight: 800; letter-spacing: -.3px; }
    .sb-username { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }

    .sb-section-label {
      font-size: 0.7rem; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .08em;
      padding: 14px 16px 6px;
    }

    #pageList {
      flex: 1; overflow-y: auto; padding: 4px 8px;
    }

    .page-item {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 10px; border-radius: 9px;
      cursor: pointer; user-select: none;
      transition: background .12s;
    }
    .page-item:hover { background: var(--bg); }
    .page-item.active { background: var(--red-soft); }
    .page-item.active .page-name { color: var(--red); font-weight: 600; }

    .page-icon { font-size: .95rem; flex-shrink: 0; }
    .page-name {
      flex: 1; font-size: .88rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .page-del {
      background: none; border: none; color: #c7c7cc;
      font-size: 1rem; padding: 2px 4px; border-radius: 4px;
      opacity: 0; transition: opacity .12s, color .12s;
    }
    .page-item:hover .page-del { opacity: 1; }
    .page-del:hover { color: var(--red); }

    .sb-new-page-btn {
      margin: 8px; width: calc(100% - 16px);
      padding: 9px; font-size: .85rem; font-weight: 600;
      color: var(--red); background: var(--red-soft);
      border: none; border-radius: 9px;
      transition: background .12s;
    }
    .sb-new-page-btn:active { background: rgba(231,76,60,.22); }

    .sb-footer {
      padding: 10px 8px 12px; border-top: 1px solid var(--border);
    }
    .sb-logout {
      width: 100%; padding: 9px; font-size: .83rem; font-weight: 600;
      color: var(--muted); background: none;
      border: 1.5px solid var(--border); border-radius: 9px;
      transition: color .12s, border-color .12s;
    }
    .sb-logout:hover { color: var(--red); border-color: var(--red); }

    /* ═══════════════════════════════
       MAIN CONTENT
    ═══════════════════════════════ */
    #mainContent {
      flex: 1; min-width: 0;
      display: flex; flex-direction: column;
      height: 100vh; overflow-y: auto;
      /* On desktop push main right of fixed sidebar */
    }

    @media (min-width: 700px) {
      #mainContent { margin-left: var(--sidebar); }
    }

    /* Top bar */
    #topbar {
      display: flex; align-items: center; gap: 10px;
      padding: 13px 18px;
      background: var(--card); border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 10;
    }
    #hamburger {
      background: none; border: none; padding: 4px;
      display: flex; flex-direction: column; gap: 5px;
    }
    #hamburger span {
      display: block; width: 22px; height: 2px;
      background: var(--text); border-radius: 2px;
    }
    #pageTitle {
      flex: 1; font-size: 1rem; font-weight: 700;
      border: none; outline: none; background: transparent; color: var(--text);
      min-width: 0;
    }
    #pageTitle:focus { border-bottom: 1.5px solid var(--red); }
    #pageTitle::placeholder { color: var(--muted); font-weight: 400; }

    /* Wheel grid */
    #wheelGrid {
      display: grid; gap: 16px;
      padding: 20px 20px 0;
    }
    #wheelGrid[data-count="1"] {
      grid-template-columns: minmax(0, 380px);
      justify-content: center;
    }
    #wheelGrid[data-count="2"],
    #wheelGrid[data-count="3"],
    #wheelGrid[data-count="4"] {
      grid-template-columns: repeat(2, 1fr);
      max-width: 780px; margin-inline: auto; width: 100%;
    }
    @media (max-width: 520px) {
      #wheelGrid[data-count="2"],
      #wheelGrid[data-count="3"],
      #wheelGrid[data-count="4"] {
        grid-template-columns: 1fr;
        max-width: 400px; justify-content: center;
      }
    }

    /* Bottom bar */
    #bottomBar {
      display: flex; flex-direction: column; align-items: center;
      gap: 13px; padding: 22px 20px 44px;
    }
    #spinAllBtn {
      width: 100%; max-width: 320px;
      padding: 15px 0; font-size: 1.05rem; font-weight: 800; letter-spacing: .08em;
      background: var(--red); color: white; border: none; border-radius: 100px;
      box-shadow: 0 5px 20px rgba(231,76,60,.38);
      transition: opacity .15s, transform .1s;
    }
    #spinAllBtn:active  { opacity: .85; transform: scale(.98); }
    #spinAllBtn:disabled { background: #c7c7cc; box-shadow: none; transform: none; }

    #addWheelBtn {
      display: flex; align-items: center; gap: 6px;
      padding: 9px 22px; font-size: .88rem; font-weight: 600;
      color: var(--red); background: var(--card);
      border: 2px dashed rgba(231,76,60,.35); border-radius: 100px;
      transition: background .15s, border-color .15s;
    }
    #addWheelBtn:hover  { background: var(--red-soft); border-color: var(--red); }
    #addWheelBtn:active { opacity: .75; }
    #addWheelBtn:disabled { color: var(--muted); border-color: var(--border); background: var(--card); cursor: default; }

    /* Empty state */
    #emptyState {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 60px 20px; color: var(--muted); text-align: center;
    }
    #emptyState .big { font-size: 3rem; margin-bottom: 12px; }
    #emptyState p { font-size: .9rem; line-height: 1.6; }

    /* ═══════════════════════════════
       WHEEL CARD
    ═══════════════════════════════ */
    .wheel-card {
      background: var(--card); border-radius: 18px;
      box-shadow: 0 2px 10px rgba(0,0,0,.07);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .card-header {
      display: flex; align-items: center; gap: 8px;
      padding: 11px 13px 10px; border-bottom: 1px solid var(--border);
    }
    .card-name {
      flex: 1; font-size: .92rem; font-weight: 700;
      border: none; outline: none; background: transparent; color: var(--text); min-width: 0;
    }
    .card-name::placeholder { color: var(--muted); font-weight: 400; }
    .card-name:focus { border-bottom: 1.5px solid var(--red); }
    .card-edit-btn {
      font-size: .73rem; font-weight: 600; color: var(--muted);
      background: var(--bg); border: none; border-radius: 6px;
      padding: 4px 9px; white-space: nowrap; transition: color .12s;
    }
    .card-edit-btn.open { color: var(--red); background: var(--red-soft); }
    .card-del-btn {
      background: none; border: none; color: #c7c7cc;
      font-size: 1.15rem; line-height: 1; padding: 4px; border-radius: 6px; transition: color .12s;
    }
    .card-del-btn:hover { color: var(--red); }

    .card-canvas-wrap {
      display: flex; flex-direction: column; align-items: center;
      padding: 16px 12px 12px;
    }
    .wheel-wrap {
      position: relative;
      width: var(--ws, 240px); height: var(--ws, 240px);
    }
    #wheelGrid[data-count="1"] .wheel-wrap { --ws: 280px; }
    #wheelGrid[data-count="2"] .wheel-wrap { --ws: min(230px, 38vw); }
    #wheelGrid[data-count="3"] .wheel-wrap,
    #wheelGrid[data-count="4"] .wheel-wrap { --ws: min(200px, 36vw); }
    @media (max-width: 520px) {
      #wheelGrid .wheel-wrap { --ws: min(270px, 82vw) !important; }
    }

    .pointer-arrow {
      position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
      width: 0; height: 0;
      border-left: 11px solid transparent; border-right: 11px solid transparent;
      border-top: 22px solid var(--red);
      filter: drop-shadow(0 2px 3px rgba(0,0,0,.18)); z-index: 2;
    }
    .wheel-canvas { width: 100%; height: 100%; display: block; touch-action: none; }

    .card-result {
      margin-top: 9px; font-size: .9rem; font-weight: 700;
      min-height: 1.3em; text-align: center; color: var(--red);
    }

    /* Items panel */
    .card-items { border-top: 1px solid var(--border); padding: 11px 13px 15px; }
    .add-row { display: flex; gap: 7px; margin-bottom: 8px; }
    .add-row input {
      flex: 1; padding: 7px 11px;
      border: 1.5px solid var(--border); border-radius: 8px;
      font-size: .84rem; background: var(--bg); outline: none; transition: border-color .15s;
    }
    .add-row input:focus { border-color: var(--red); background: white; }
    .add-row button {
      padding: 7px 13px; background: var(--red); color: white;
      border: none; border-radius: 8px; font-size: .84rem; font-weight: 600;
    }
    .add-row button:active { opacity: .8; }

    .item-list { display: flex; flex-direction: column; gap: 5px; }
    .item-row {
      display: flex; align-items: center; gap: 7px;
      background: var(--bg); border-radius: 7px; padding: 6px 9px;
    }
    .item-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .item-inp {
      flex: 1; border: none; font-size: .84rem;
      outline: none; background: transparent; color: var(--text); min-width: 0;
    }
    .item-del { background: none; border: none; color: #c7c7cc; font-size: 1rem; line-height: 1; padding: 0 2px; }
    .item-del:active { color: var(--red); }
  </style>
</head>
<body>

<!-- ═══════════════════════════════
     LOGIN
═══════════════════════════════ -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">🎡</div>
    <h1>Spin the Wheel</h1>
    <p class="login-sub">Sign in to save your wheels</p>
    <div class="tab-row">
      <button id="tabLogin" class="active" onclick="switchTab('login')">Log In</button>
      <button id="tabRegister" onclick="switchTab('register')">Register</button>
    </div>
    <div class="form-group">
      <label>Username</label>
      <input id="authUser" type="text" autocomplete="username" placeholder="Your username" maxlength="32">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input id="authPass" type="password" autocomplete="current-password" placeholder="Your password" maxlength="64">
    </div>
    <div class="auth-error" id="authError"></div>
    <button class="btn-primary" id="authBtn" onclick="handleAuth()">Log In</button>
  </div>
</div>

<!-- ═══════════════════════════════
     APP
═══════════════════════════════ -->
<div id="appScreen">

  <!-- Overlay (mobile) -->
  <div id="overlay" onclick="closeSidebar()"></div>

  <!-- Sidebar -->
  <div id="sidebar">
    <div class="sb-header">
      <div class="sb-app-name">🎡 Spin the Wheel</div>
      <div class="sb-username" id="sbUsername"></div>
    </div>
    <div class="sb-section-label">Pages</div>
    <div id="pageList"></div>
    <button class="sb-new-page-btn" onclick="createPage()">＋ New Page</button>
    <div class="sb-footer">
      <button class="sb-logout" onclick="logout()">Log Out</button>
    </div>
  </div>

  <!-- Main -->
  <div id="mainContent">
    <div id="topbar">
      <button id="hamburger" onclick="toggleSidebar()" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
      <input id="pageTitle" type="text" maxlength="40" placeholder="Page name" oninput="onPageTitleChange()">
    </div>

    <!-- No pages yet -->
    <div id="emptyState" hidden>
      <div class="big">📋</div>
      <p>No page selected.<br>Create a page from the sidebar.</p>
    </div>

    <!-- Active page content -->
    <div id="pageContent" hidden>
      <div id="wheelGrid"></div>
      <div id="bottomBar">
        <button id="spinAllBtn" onclick="spinAll()">SPIN ALL</button>
        <button id="addWheelBtn" onclick="addWheel()">＋ Add Wheel</button>
      </div>
    </div>
  </div>

</div>

<script>
  /* ═══════════════════════════════════════
     CONSTANTS
  ═══════════════════════════════════════ */
  const MAX_WHEELS = 4;
  const STORE_KEY  = 'spinapp_v3';
  const COLORS = [
    '#FF6B6B','#4ECDC4','#45B7D1','#96CEB4',
    '#F7DC6F','#C39BD3','#7FB3D3','#F0A27A',
    '#76D7C4','#F1948A'
  ];

  let currentUser   = null;
  let currentPageId = null;
  let authMode      = 'login';

  // Runtime spin state per wheel id
  const rt = {}; // { [wheelId]: { angle, spinning, animFrame } }

  /* ═══════════════════════════════════════
     STORAGE
  ═══════════════════════════════════════ */
  function load() {
    try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; } catch { return {}; }
  }
  function persist(d) { localStorage.setItem(STORE_KEY, JSON.stringify(d)); }

  function getPages() {
    const d = load();
    return d.data?.[currentUser]?.pages || [];
  }
  function savePages(pages) {
    const d = load();
    d.data = d.data || {};
    d.data[currentUser] = d.data[currentUser] || {};
    d.data[currentUser].pages = pages;
    persist(d);
  }
  function getCurrentPage() {
    return getPages().find(p => p.id === currentPageId) || null;
  }
  function getWheels() {
    return getCurrentPage()?.wheels || [];
  }
  function saveWheels(wheels) {
    const pages = getPages();
    const i = pages.findIndex(p => p.id === currentPageId);
    if (i !== -1) { pages[i].wheels = wheels; savePages(pages); }
  }

  /* ═══════════════════════════════════════
     AUTH
  ═══════════════════════════════════════ */
  function switchTab(mode) {
    authMode = mode;
    document.getElementById('tabLogin').classList.toggle('active', mode === 'login');
    document.getElementById('tabRegister').classList.toggle('active', mode === 'register');
    document.getElementById('authBtn').textContent = mode === 'login' ? 'Log In' : 'Create Account';
    document.getElementById('authError').textContent = '';
  }

  function handleAuth() {
    const username = document.getElementById('authUser').value.trim();
    const password = document.getElementById('authPass').value;
    const errEl    = document.getElementById('authError');
    if (!username || !password) { errEl.textContent = 'Please fill in all fields.'; return; }

    const d = load();
    d.users = d.users || {};

    if (authMode === 'register') {
      if (d.users[username]) { errEl.textContent = 'Username already taken.'; return; }
      d.users[username] = btoa(password);
      d.data = d.data || {};
      d.data[username] = { pages: [makePage('Page 1')] };
      persist(d);
    } else {
      if (!d.users[username] || d.users[username] !== btoa(password)) {
        errEl.textContent = 'Incorrect username or password.'; return;
      }
      // Ensure at least one page
      d.data = d.data || {};
      if (!d.data[username]?.pages?.length) {
        d.data[username] = { pages: [makePage('Page 1')] };
        persist(d);
      }
    }
    enterApp(username);
  }

  function enterApp(username) {
    currentUser = username;
    document.getElementById('loginScreen').hidden = true;
    document.getElementById('appScreen').classList.add('visible');
    document.getElementById('sbUsername').textContent = '@' + username;

    const pages = getPages();
    currentPageId = pages.length ? pages[0].id : null;
    renderSidebar();
    renderPage();
  }

  function logout() {
    Object.values(rt).forEach(s => { if (s.animFrame) cancelAnimationFrame(s.animFrame); });
    Object.keys(rt).forEach(k => delete rt[k]);
    currentUser = null; currentPageId = null;
    document.getElementById('appScreen').classList.remove('visible');
    document.getElementById('loginScreen').hidden = false;
    document.getElementById('wheelGrid').innerHTML = '';
    document.getElementById('authUser').value = '';
    document.getElementById('authPass').value = '';
    document.getElementById('authError').textContent = '';
    closeSidebar();
  }

  document.getElementById('authPass').addEventListener('keydown', e => { if (e.key === 'Enter') handleAuth(); });
  document.getElementById('authUser').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('authPass').focus(); });

  /* ═══════════════════════════════════════
     SIDEBAR
  ═══════════════════════════════════════ */
  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('overlay').classList.toggle('show');
  }
  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('overlay').classList.remove('show');
  }

  function renderSidebar() {
    const list  = document.getElementById('pageList');
    const pages = getPages();
    list.innerHTML = '';
    pages.forEach(p => {
      const el = document.createElement('div');
      el.className = 'page-item' + (p.id === currentPageId ? ' active' : '');

      const icon = document.createElement('span');
      icon.className = 'page-icon'; icon.textContent = '📋';

      const name = document.createElement('span');
      name.className = 'page-name'; name.textContent = p.name || 'Untitled';

      const del = document.createElement('button');
      del.className = 'page-del'; del.textContent = '×'; del.title = 'Delete page';
      del.addEventListener('click', e => { e.stopPropagation(); deletePage(p.id); });

      el.appendChild(icon); el.appendChild(name); el.appendChild(del);
      el.addEventListener('click', () => { switchPage(p.id); closeSidebar(); });
      list.appendChild(el);
    });
  }

  /* ═══════════════════════════════════════
     PAGES
  ═══════════════════════════════════════ */
  function uid() { return Math.random().toString(36).slice(2, 9); }

  function makePage(name = 'New Page') {
    return {
      id: uid(), name,
      wheels: [makeWheel('Wheel 1', ['Option A','Option B','Option C','Option D'])]
    };
  }

  function createPage() {
    const pages = getPages();
    const p = makePage(`Page ${pages.length + 1}`);
    pages.push(p);
    savePages(pages);
    switchPage(p.id);
    closeSidebar();
    setTimeout(() => { document.getElementById('pageTitle').select(); }, 50);
  }

  function deletePage(id) {
    let pages = getPages().filter(p => p.id !== id);
    if (pages.length === 0) pages = [makePage('Page 1')];
    savePages(pages);
    if (currentPageId === id) currentPageId = pages[0].id;
    renderSidebar();
    renderPage();
  }

  function switchPage(id) {
    // Cancel any running animations
    Object.values(rt).forEach(s => { if (s.animFrame) cancelAnimationFrame(s.animFrame); });
    Object.keys(rt).forEach(k => delete rt[k]);
    currentPageId = id;
    renderSidebar();
    renderPage();
  }

  function onPageTitleChange() {
    const val   = document.getElementById('pageTitle').value;
    const pages = getPages();
    const i     = pages.findIndex(p => p.id === currentPageId);
    if (i !== -1) { pages[i].name = val; savePages(pages); renderSidebar(); }
  }

  /* ═══════════════════════════════════════
     WHEELS
  ═══════════════════════════════════════ */
  function makeWheel(name = 'New Wheel', items = []) {
    return { id: uid(), name, items };
  }

  function addWheel() {
    const wheels = getWheels();
    if (wheels.length >= MAX_WHEELS) return;
    const n = wheels.length + 1;
    wheels.push(makeWheel(`Wheel ${n}`));
    saveWheels(wheels);
    renderGrid();
    const names = document.querySelectorAll('.card-name');
    names[names.length - 1]?.select();
  }

  function removeWheel(id) {
    if (rt[id]?.animFrame) cancelAnimationFrame(rt[id].animFrame);
    delete rt[id];
    const wheels = getWheels().filter(w => w.id !== id);
    saveWheels(wheels.length ? wheels : [makeWheel('Wheel 1')]);
    renderGrid();
  }

  /* ═══════════════════════════════════════
     PAGE RENDER
  ═══════════════════════════════════════ */
  function renderPage() {
    const page = getCurrentPage();
    document.getElementById('emptyState').hidden  = !!page;
    document.getElementById('pageContent').hidden = !page;
    if (!page) { document.getElementById('pageTitle').value = ''; return; }
    document.getElementById('pageTitle').value = page.name;
    renderGrid();
  }

  function renderGrid() {
    const wheels = getWheels();
    const grid   = document.getElementById('wheelGrid');
    grid.innerHTML = '';
    grid.dataset.count = Math.max(wheels.length, 1);

    wheels.forEach(w => {
      rt[w.id] = rt[w.id] || { angle: 0, spinning: false, animFrame: null };
      grid.appendChild(buildCard(w));
    });

    document.getElementById('addWheelBtn').disabled = wheels.length >= MAX_WHEELS;
    updateSpinBtn();
  }

  /* ═══════════════════════════════════════
     SPIN ALL
  ═══════════════════════════════════════ */
  function updateSpinBtn() {
    document.getElementById('spinAllBtn').disabled = Object.values(rt).some(s => s.spinning);
  }

  function spinAll() {
    const wheels = getWheels();
    if (!wheels.length || Object.values(rt).some(s => s.spinning)) return;
    document.querySelectorAll('.card-result').forEach(el => el.textContent = '');
    const t0 = performance.now();
    wheels.forEach(w => spinWheel(w, t0));
    updateSpinBtn();
  }

  function spinWheel(w, t0) {
    const state = rt[w.id];
    if (!state || state.spinning) return;

    const canvas   = document.querySelector(`.wheel-card[data-id="${w.id}"] .wheel-canvas`);
    const resultEl = document.querySelector(`.wheel-card[data-id="${w.id}"] .card-result`);
    if (!canvas) return;

    state.spinning = true;
    const totalRot  = (4 + Math.random() * 3) * Math.PI * 2 + Math.random() * Math.PI * 2;
    const duration  = 3800 + Math.random() * 800;
    const startAngle = state.angle;
    const items = [...w.items]; // snapshot at spin time

    function easeOut(t) { return 1 - Math.pow(1 - t, 4); }

    function animate(now) {
      const progress = Math.min((now - t0) / duration, 1);
      state.angle = startAngle + totalRot * easeOut(progress);
      drawOnCanvas(canvas, items, state.angle);

      if (progress < 1) {
        state.animFrame = requestAnimationFrame(animate);
      } else {
        state.spinning  = false;
        state.animFrame = null;
        if (items.length) {
          const arc = (Math.PI * 2) / items.length;
          const rel = ((-Math.PI / 2 - state.angle) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2);
          resultEl.textContent = items[Math.floor(rel / arc) % items.length];
        }
        updateSpinBtn();
      }
    }
    state.animFrame = requestAnimationFrame(animate);
  }

  /* ═══════════════════════════════════════
     CARD
  ═══════════════════════════════════════ */
  function buildCard(w) {
    const card = document.createElement('div');
    card.className = 'wheel-card';
    card.dataset.id = w.id;

    // Header
    const header   = document.createElement('div');
    header.className = 'card-header';

    const nameInp  = document.createElement('input');
    nameInp.type = 'text'; nameInp.className = 'card-name';
    nameInp.value = w.name; nameInp.maxLength = 32; nameInp.placeholder = 'Wheel name';
    nameInp.addEventListener('input', () => {
      const wheels = getWheels();
      const i = wheels.findIndex(x => x.id === w.id);
      if (i !== -1) { wheels[i].name = nameInp.value; saveWheels(wheels); }
    });

    const editBtn  = document.createElement('button');
    editBtn.className = 'card-edit-btn'; editBtn.textContent = 'Edit Items';

    const delBtn   = document.createElement('button');
    delBtn.className = 'card-del-btn'; delBtn.title = 'Remove'; delBtn.textContent = '×';
    delBtn.addEventListener('click', () => removeWheel(w.id));

    header.appendChild(nameInp); header.appendChild(editBtn); header.appendChild(delBtn);

    // Canvas
    const canvasWrap = document.createElement('div');
    canvasWrap.className = 'card-canvas-wrap';

    const wheelWrap  = document.createElement('div');
    wheelWrap.className = 'wheel-wrap';

    const pointer    = document.createElement('div');
    pointer.className = 'pointer-arrow';

    const canvas     = document.createElement('canvas');
    canvas.className = 'wheel-canvas'; canvas.width = 500; canvas.height = 500;

    wheelWrap.appendChild(pointer); wheelWrap.appendChild(canvas);

    const resultEl   = document.createElement('div');
    resultEl.className = 'card-result';

    canvasWrap.appendChild(wheelWrap); canvasWrap.appendChild(resultEl);

    // Items panel
    const itemsPanel = document.createElement('div');
    itemsPanel.className = 'card-items'; itemsPanel.hidden = true;

    const addRow     = document.createElement('div');
    addRow.className = 'add-row';
    const addInp     = document.createElement('input');
    addInp.type = 'text'; addInp.placeholder = 'Add an item…'; addInp.maxLength = 24;
    const addBtn     = document.createElement('button');
    addBtn.textContent = 'Add';
    addRow.appendChild(addInp); addRow.appendChild(addBtn);

    const itemList   = document.createElement('div');
    itemList.className = 'item-list';

    itemsPanel.appendChild(addRow); itemsPanel.appendChild(itemList);

    // Toggle items panel
    editBtn.addEventListener('click', () => {
      const open = !itemsPanel.hidden;
      itemsPanel.hidden = open;
      editBtn.classList.toggle('open', !open);
      editBtn.textContent = open ? 'Edit Items' : 'Done';
    });

    card.appendChild(header); card.appendChild(canvasWrap); card.appendChild(itemsPanel);

    /* ── Item management (bug fix: always pass items array directly to draw) ── */

    // Reads items from storage and rebuilds the list + redraws wheel
    function syncItems() {
      const wheels = getWheels();
      const wheel  = wheels.find(x => x.id === w.id);
      const items  = wheel ? wheel.items : [];
      renderItemRows(items);
      drawOnCanvas(canvas, items, rt[w.id]?.angle || 0); // draw with fresh items immediately
    }

    // Renders the DOM rows for a given items array (no storage read)
    function renderItemRows(items) {
      itemList.innerHTML = '';
      items.forEach((item, i) => {
        const row  = document.createElement('div');
        row.className = 'item-row';

        const dot  = document.createElement('div');
        dot.className = 'item-dot'; dot.style.background = COLORS[i % COLORS.length];

        const inp  = document.createElement('input');
        inp.className = 'item-inp'; inp.type = 'text';
        inp.value = item; inp.maxLength = 24;
        inp.addEventListener('input', () => {
          const ws = getWheels();
          const wi = ws.findIndex(x => x.id === w.id);
          if (wi !== -1) {
            ws[wi].items[i] = inp.value;
            saveWheels(ws);
            drawOnCanvas(canvas, ws[wi].items, rt[w.id]?.angle || 0);
          }
        });

        const del  = document.createElement('button');
        del.className = 'item-del'; del.textContent = '×';
        del.addEventListener('click', () => {
          const ws = getWheels();
          const wi = ws.findIndex(x => x.id === w.id);
          if (wi !== -1) {
            ws[wi].items.splice(i, 1);
            saveWheels(ws);
            syncItems(); // re-render list + redraw
          }
        });

        row.appendChild(dot); row.appendChild(inp); row.appendChild(del);
        itemList.appendChild(row);
      });
    }

    function doAdd() {
      const val = addInp.value.trim();
      if (!val) return;
      const ws = getWheels();
      const wi = ws.findIndex(x => x.id === w.id);
      if (wi === -1) return;
      ws[wi].items.push(val);
      saveWheels(ws);
      addInp.value = '';
      // ── Bug fix: draw with the new items array immediately ──
      const newItems = ws[wi].items;
      renderItemRows(newItems);
      drawOnCanvas(canvas, newItems, rt[w.id]?.angle || 0);
    }

    addBtn.addEventListener('click', doAdd);
    addInp.addEventListener('keydown', e => { if (e.key === 'Enter') doAdd(); });

    // Initial draw
    syncItems();
    return card;
  }

  /* ═══════════════════════════════════════
     DRAW
  ═══════════════════════════════════════ */
  function drawOnCanvas(canvas, items, angle) {
    const ctx = canvas.getContext('2d');
    const cx  = canvas.width / 2;
    const cy  = canvas.height / 2;
    const r   = cx - 14;
    const n   = items.length;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (n === 0) {
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fillStyle = '#e5e5ea'; ctx.fill();
      ctx.fillStyle = '#aeaeb2'; ctx.font = '22px -apple-system, sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('No items yet', cx, cy);
      return;
    }

    const arc = (Math.PI * 2) / n;
    for (let i = 0; i < n; i++) {
      const start = angle + i * arc;
      const end   = start + arc;
      ctx.beginPath(); ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, r, start, end); ctx.closePath();
      ctx.fillStyle = COLORS[i % COLORS.length]; ctx.fill();
      ctx.strokeStyle = 'white'; ctx.lineWidth = 4; ctx.stroke();

      ctx.save(); ctx.translate(cx, cy); ctx.rotate(start + arc / 2);
      const label    = items[i].length > 14 ? items[i].slice(0, 14) + '…' : items[i];
      const fontSize = Math.min(26, Math.max(12, Math.floor(190 / Math.max(n, 2))));
      ctx.font = `600 ${fontSize}px -apple-system, sans-serif`;
      ctx.fillStyle = '#2c2c2e'; ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
      ctx.shadowColor = 'rgba(255,255,255,0.85)'; ctx.shadowBlur = 5;
      ctx.fillText(label, r - 18, 0); ctx.restore();
    }

    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.strokeStyle = 'white'; ctx.lineWidth = 6; ctx.stroke();

    ctx.beginPath(); ctx.arc(cx, cy, 22, 0, Math.PI * 2);
    ctx.fillStyle = 'white'; ctx.fill();
    ctx.strokeStyle = '#e5e5ea'; ctx.lineWidth = 2; ctx.stroke();
  }

  /* ═══════════════════════════════════════
     INIT
  ═══════════════════════════════════════ */
  document.getElementById('appScreen').style.display = '';
</script>
</body>
