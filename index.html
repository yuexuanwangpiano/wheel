<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --red: #e8522a;
  --red-soft: rgba(232,82,42,0.12);
  --bg: #f0ebe0;
  --card: #faf7f2;
  --border: #ddd6c8;
  --text: #2a1f1a;
  --muted: #9e8e7e;
  --accent2: #e8358a;
  --accent3: #f5b832;
  --purple: #6b3fa0;
  --sidebar: 240px;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); -webkit-text-size-adjust: 100%; }
button { cursor: pointer; -webkit-tap-highlight-color: transparent; font-family: inherit; }
input { -webkit-appearance: none; font-family: inherit; }
[hidden] { display: none !important; }

/* ═══════════════════════════════ LOGIN (practice-journal style) ═══════════════════════════════ */
.login-screen {
  display: none;
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 2000;
  align-items: center;
  justify-content: center;
  padding: 32px 24px;
}
.login-screen.visible { display: flex; }
.login-box {
  width: 100%;
  max-width: 340px;
}
.login-title {
  font-size: 2rem;
  font-weight: 700;
  letter-spacing: -0.02em;
  margin-bottom: 6px;
  color: var(--text);
}
.login-logo {
  font-size: 2.4rem;
  margin-bottom: 10px;
}
.login-sub {
  font-size: 0.72rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 36px;
}
.section-label {
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 6px;
}
.login-input {
  width: 100%;
  padding: 11px 14px;
  background: var(--card);
  border: 1.5px solid var(--border);
  font-size: 0.95rem;
  color: var(--text);
  outline: none;
  border-radius: 10px;
  transition: border-color 0.2s;
}
.login-input:focus { border-color: var(--red); }
.login-error {
  font-size: 0.75rem;
  color: #c0392b;
  min-height: 18px;
  margin-bottom: 8px;
  letter-spacing: 0.04em;
}
.login-hint {
  font-size: 0.7rem;
  color: var(--muted);
  margin-top: 14px;
  text-align: center;
  line-height: 1.5;
}
.save-btn {
  width: 100%;
  padding: 13px;
  font-size: 0.95rem;
  font-weight: 700;
  background: linear-gradient(135deg, var(--red), var(--accent2));
  color: white;
  border: none;
  border-radius: 11px;
  margin-top: 18px;
  box-shadow: 0 3px 12px rgba(232,53,138,.3);
  transition: opacity 0.15s;
}
.save-btn:active { opacity: 0.8; }
.save-btn:disabled { background: #c7c7cc; box-shadow: none; }

/* ═══════════════════════════════ APP LAYOUT ═══════════════════════════════ */
#appScreen { display: none; height: 100vh; overflow: hidden; }
@media (min-width: 700px) {
  #appScreen { display: none; flex-direction: row; }
  #appScreen.visible { display: flex !important; }
  #overlay { display: none !important; }
  #hamburger { display: none !important; }
  #sidebar { transform: none !important; position: relative !important; }
}
@media (max-width: 699px) {
  #appScreen.visible { display: flex !important; flex-direction: column; height: 100vh; }
}

/* ═══════════════════════════════ SIDEBAR ═══════════════════════════════ */
#overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 40; }
#overlay.show { display: block; }
#sidebar {
  width: var(--sidebar); flex-shrink: 0;
  background: linear-gradient(180deg, #2a1a2e 0%, #1a1018 100%);
  border-right: none; display: flex; flex-direction: column; overflow: hidden;
  position: fixed; top: 0; left: 0; bottom: 0; z-index: 50;
  transform: translateX(-100%); transition: transform .25s cubic-bezier(.4,0,.2,1);
}
#sidebar.open { transform: translateX(0); }
.sb-header { padding: 18px 16px 14px; border-bottom: 1px solid rgba(255,255,255,0.08); }
.sb-app-name { font-size: 1rem; font-weight: 800; letter-spacing: -.3px; color: var(--accent3); }
.sb-username { font-size: 0.78rem; color: rgba(255,255,255,0.45); margin-top: 2px; }
.sb-section-label { font-size: 0.7rem; font-weight: 700; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: .08em; padding: 14px 16px 6px; }
#pageList { flex: 1; overflow-y: auto; padding: 4px 8px; }
.page-item { display: flex; align-items: center; gap: 8px; padding: 9px 10px; border-radius: 9px; cursor: pointer; user-select: none; transition: background .12s; }
.page-item:hover { background: rgba(255,255,255,0.07); }
.page-item.active { background: rgba(232,82,42,0.25); }
.page-item.active .page-name { color: var(--accent3); font-weight: 600; }
.page-icon { font-size: .95rem; flex-shrink: 0; }
.page-name { flex: 1; font-size: .88rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: rgba(255,255,255,0.75); }
.page-del { background: none; border: none; color: rgba(255,255,255,0.35); font-size: 1rem; padding: 2px 4px; border-radius: 4px; transition: color .12s; flex-shrink: 0; }
.page-del:hover { color: var(--accent2); }
.sb-new-page-btn { margin: 8px; width: calc(100% - 16px); padding: 9px; font-size: .85rem; font-weight: 600; color: var(--accent3); background: rgba(245,184,50,0.12); border: none; border-radius: 9px; transition: background .12s; }
.sb-new-page-btn:active { background: rgba(245,184,50,0.22); }
.sb-footer { padding: 10px 8px 12px; border-top: 1px solid rgba(255,255,255,0.08); }
.sb-logout { width: 100%; padding: 9px; font-size: .83rem; font-weight: 600; color: rgba(255,255,255,0.4); background: none; border: 1.5px solid rgba(255,255,255,0.12); border-radius: 9px; transition: color .12s, border-color .12s; }
.sb-logout:hover { color: var(--accent2); border-color: var(--accent2); }
.page-rename-btn { background: none; border: none; color: rgba(255,255,255,0.35); font-size: 0.85rem; padding: 2px 3px; border-radius: 4px; transition: color .12s; cursor: pointer; flex-shrink: 0; }
.page-rename-btn:hover { color: var(--accent3); }
.page-rename-inp { flex: 1; background: rgba(255,255,255,0.1); border: 1px solid var(--accent3); border-radius: 5px; color: white; font-size: .88rem; padding: 2px 6px; outline: none; min-width: 0; }

/* ═══════════════════════════════ MAIN CONTENT ═══════════════════════════════ */
#mainContent { flex: 1; min-width: 0; display: flex; flex-direction: column; height: 100vh; overflow-y: auto; }
@media (min-width: 700px) { #mainContent { margin-left: var(--sidebar); } }
#topbar { display: flex; align-items: center; gap: 10px; padding: 13px 18px; background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; }
#hamburger { background: none; border: none; padding: 4px; display: flex; flex-direction: column; gap: 5px; }
#hamburger span { display: block; width: 22px; height: 2px; background: var(--text); border-radius: 2px; }
#pageTitle { flex: 1; font-size: 1rem; font-weight: 700; border: none; outline: none; background: transparent; color: var(--text); min-width: 0; }
#pageTitle:focus { border-bottom: 1.5px solid var(--red); }
#pageTitle::placeholder { color: var(--muted); font-weight: 400; }

/* Wheel grid */
#wheelGrid { display: grid; gap: 16px; padding: 20px 20px 0; max-width: 780px; margin-inline: auto; width: 100%; }
#wheelGrid[data-count="1"] { grid-template-columns: minmax(0, 380px); justify-content: center; }
#wheelGrid[data-count="2"] { grid-template-columns: repeat(2, 1fr); }
#wheelGrid[data-count="3"] { grid-template-columns: repeat(2, 1fr); }
#wheelGrid[data-count="4"] { grid-template-columns: repeat(2, 1fr); }
/* Triangle layout: 3rd wheel spans both columns and centers */
#wheelGrid[data-count="3"] .wheel-card:nth-child(3) { grid-column: 1 / -1; max-width: calc(50% - 8px); margin-inline: auto; }
@media (max-width: 520px) {
  #wheelGrid[data-count="3"] .wheel-card:nth-child(3) { grid-column: 1 / -1; max-width: calc(50% - 8px); margin-inline: auto; }
}

/* Bottom bar */
#bottomBar { display: flex; flex-direction: column; align-items: center; gap: 13px; padding: 22px 20px 44px; }
#spinAllBtn { width: 100%; max-width: 320px; padding: 15px 0; font-size: 1.05rem; font-weight: 800; letter-spacing: .08em; background: linear-gradient(135deg, var(--red), var(--accent2)); color: white; border: none; border-radius: 100px; box-shadow: 0 5px 20px rgba(232,53,138,.35); transition: opacity .15s, transform .1s; }
#spinAllBtn:active { opacity: .85; transform: scale(.98); }
#spinAllBtn:disabled { background: #c7c7cc; box-shadow: none; transform: none; }
#addWheelBtn { display: flex; align-items: center; gap: 6px; padding: 9px 22px; font-size: .88rem; font-weight: 600; color: var(--red); background: var(--card); border: 2px dashed rgba(231,76,60,.35); border-radius: 100px; transition: background .15s, border-color .15s; }
#addWheelBtn:hover { background: var(--red-soft); border-color: var(--red); }
#addWheelBtn:disabled { color: var(--muted); border-color: var(--border); background: var(--card); cursor: default; }
.preset-btns { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; max-width: 360px; }
.preset-btn { padding: 7px 16px; font-size: .78rem; font-weight: 700; color: var(--accent3); background: rgba(245,184,50,0.1); border: 1.5px solid rgba(245,184,50,0.35); border-radius: 100px; transition: background .15s, border-color .15s; letter-spacing: .04em; }
.preset-btn:hover { background: rgba(245,184,50,0.22); border-color: var(--accent3); }
.preset-btn:disabled { color: var(--muted); border-color: var(--border); background: var(--card); cursor: default; opacity: 0.5; }

/* Empty state */
#emptyState { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; color: var(--muted); text-align: center; }
#emptyState .big { font-size: 3rem; margin-bottom: 12px; }
#emptyState p { font-size: .9rem; line-height: 1.6; }

/* ═══════════════════════════════ WHEEL CARD ═══════════════════════════════ */
.wheel-card { background: var(--card); border-radius: 18px; box-shadow: 0 2px 10px rgba(0,0,0,.07); display: flex; flex-direction: column; overflow: hidden; }
.card-header { display: flex; align-items: center; gap: 8px; padding: 11px 13px 10px; border-bottom: 1px solid var(--border); }
.card-name { flex: 1; font-size: .92rem; font-weight: 700; border: none; outline: none; background: transparent; color: var(--text); min-width: 0; }
.card-name::placeholder { color: var(--muted); font-weight: 400; }
.card-name:focus { border-bottom: 1.5px solid var(--red); }
.card-edit-btn { font-size: .73rem; font-weight: 600; color: var(--muted); background: var(--bg); border: none; border-radius: 6px; padding: 4px 9px; white-space: nowrap; transition: color .12s; }
.card-edit-btn.open { color: var(--red); background: var(--red-soft); }
.card-del-btn { background: none; border: none; color: #c7c7cc; font-size: 1.15rem; line-height: 1; padding: 4px; border-radius: 6px; transition: color .12s; }
.card-del-btn:hover { color: var(--red); }
.card-canvas-wrap { display: flex; flex-direction: column; align-items: center; padding: 16px 12px 12px; }
.wheel-wrap { position: relative; width: var(--ws, 240px); height: var(--ws, 240px); }
#wheelGrid[data-count="1"] .wheel-wrap { --ws: 280px; }
#wheelGrid[data-count="2"] .wheel-wrap { --ws: min(230px, 38vw); }
#wheelGrid[data-count="3"] .wheel-wrap { --ws: min(220px, 36vw); }
#wheelGrid[data-count="4"] .wheel-wrap { --ws: min(200px, 34vw); }
@media (max-width: 520px) { #wheelGrid .wheel-wrap { --ws: min(160px, 42vw) !important; } }
.pointer-arrow { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 11px solid transparent; border-right: 11px solid transparent; border-top: 22px solid var(--accent3); filter: drop-shadow(0 2px 3px rgba(0,0,0,.18)); z-index: 2; }
.wheel-canvas { width: 100%; height: 100%; display: block; touch-action: none; }
.card-result { margin-top: 9px; font-size: .9rem; font-weight: 700; min-height: 1.3em; text-align: center; color: var(--red); }
/* Result overlay on top of wheel */
.wheel-result-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.4s;
}
.wheel-result-overlay.visible { opacity: 1; }
.wheel-result-bubble {
  background: rgba(255,255,255,0.92);
  border-radius: 16px;
  padding: 10px 18px;
  font-size: 1.1rem;
  font-weight: 800;
  color: var(--text);
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  text-align: center;
  max-width: 85%;
  word-break: break-word;
  border: 2px solid var(--accent3);
}
.card-items { border-top: 1px solid var(--border); padding: 11px 13px 15px; }
.add-row { display: flex; gap: 7px; margin-bottom: 8px; }
.add-row input { flex: 1; padding: 7px 11px; border: 1.5px solid var(--border); border-radius: 8px; font-size: .84rem; background: var(--bg); outline: none; transition: border-color .15s; }
.add-row input:focus { border-color: var(--red); background: white; }
.add-row button { padding: 7px 13px; background: var(--red); color: white; border: none; border-radius: 8px; font-size: .84rem; font-weight: 600; }
.item-list { display: flex; flex-direction: column; gap: 5px; }
.item-row { display: flex; align-items: center; gap: 7px; background: var(--bg); border-radius: 7px; padding: 6px 9px; }
.item-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.item-inp { flex: 1; border: none; font-size: .84rem; outline: none; background: transparent; color: var(--text); min-width: 0; }
.item-del { background: none; border: none; color: #c7c7cc; font-size: 1rem; line-height: 1; padding: 0 2px; }
.item-del:active { color: var(--red); }

/* Loading */
.loading-screen { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 3000; align-items: center; justify-content: center; }
.loading-screen.visible { display: flex; }
.loading-spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--red); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- ═══════════════════════════════ LOGIN (practice-journal style) ═══════════════════════════════ -->
<div class="login-screen visible" id="login-screen">
  <div class="login-box">
    <div class="login-logo">🎡</div>
    <div class="login-title">Spin the Wheel</div>

    <div class="login-error" id="login-error"></div>
    <div class="section-label">Username</div>
    <input type="text" class="login-input" id="login-username" placeholder="" autocomplete="off" autocapitalize="none">
    <div class="section-label" style="margin-bottom:6px;margin-top:14px;">PIN <span style="font-size:0.55rem;color:var(--muted);">(4 digits)</span></div>
    <input type="password" class="login-input" id="login-pin" placeholder="••••" maxlength="4" inputmode="numeric">
    <button class="save-btn" onclick="handleLogin()">Enter</button>
    <div class="login-hint">New username? We'll create your account automatically.</div>
  </div>
</div>

<!-- Loading -->
<div class="loading-screen" id="loading-screen">
  <div class="loading-spinner"></div>
</div>

<!-- ═══════════════════════════════ APP ═══════════════════════════════ -->
<div id="appScreen">
  <div id="overlay" onclick="closeSidebar()"></div>
  <div id="sidebar">
    <div class="sb-header">
      <div class="sb-app-name">🎡 Spin the Wheel</div>
      <div class="sb-username" id="sbUsername"></div>
    </div>
    <div class="sb-section-label">Pages</div>
    <div id="pageList"></div>
    <button class="sb-new-page-btn" onclick="createPage()">＋ New Page</button>
    <div class="sb-footer">
      <button class="sb-logout" onclick="logout()">Log Out</button>
    </div>
  </div>
  <div id="mainContent">
    <div id="topbar">
      <button id="hamburger" onclick="toggleSidebar()" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
      <input id="pageTitle" type="text" maxlength="40" placeholder="Page name" oninput="onPageTitleChange()">
    </div>
    <div id="emptyState" hidden>
      <div class="big">📋</div>
      <p>No page selected.<br>Create a page from the sidebar.</p>
    </div>
    <div id="pageContent" hidden>
      <div id="wheelGrid"></div>
      <div id="bottomBar">
        <button id="spinAllBtn" onclick="spinAll()">SPIN ALL</button>
        <button id="addWheelBtn" onclick="addWheel()">＋ NEW</button>
        <div class="preset-btns">
          <button class="preset-btn" onclick="addPresetWheel('keys')">＋ All Keys Wheel</button>
          <button class="preset-btn" onclick="addPresetWheel('major')">＋ All Major Wheel</button>
          <button class="preset-btn" onclick="addPresetWheel('minor')">＋ All Minor Wheel</button>
        </div>
      </div>
    </div>
  </div>
</div>

/* ═══════════════════ CONSTANTS ═══════════════════ */
const MAX_WHEELS = 4;

const rt = {}; // runtime spin state

/* ═══════════════════ AUTH ═══════════════════ */
async function hashPin(pin) {
  if (!crypto?.subtle) return pin;
  try {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pin));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  } catch(e) { return pin; }
}

async function handleLogin() {
  const username = document.getElementById('login-username').value.trim().toLowerCase();
  const pin = document.getElementById('login-pin').value.trim();
  const errEl = document.getElementById('login-error');
  const btn = document.querySelector('#login-screen .save-btn');
  errEl.textContent = '';

  if (!username) { errEl.textContent = 'Please enter a username.'; return; }
  if (!/^\d{4}$/.test(pin)) { errEl.textContent = 'PIN must be exactly 4 digits.'; return; }

  btn.textContent = 'Signing in…'; btn.disabled = true;

  try {
    const userRef = doc(db, 'wheel_users', username);
    const snap = await getDoc(userRef);
    const pinHash = await hashPin(pin);

    if (snap.exists()) {
      const stored = snap.data().pin;
      const match = stored === pinHash || stored === pin;
      if (!match) {
        errEl.textContent = 'Wrong PIN. Try again.';
        btn.textContent = 'Enter'; btn.disabled = false;
        return;
      }
      // Upgrade plain-text PIN to hash silently
      if (stored === pin && pinHash !== pin) {
        await setDoc(userRef, { pin: pinHash, createdAt: snap.data().createdAt }, { merge: true });
      }
    } else {
      // New user
      await setDoc(userRef, { pin: pinHash, createdAt: Date.now() });
    }

    currentUser = username;
    localStorage.setItem('wheel_session', username);
    btn.textContent = 'Enter'; btn.disabled = false;
    await showApp();
  } catch(e) {
    console.error('Login error:', e);
    errEl.textContent = 'Error: ' + (e?.message || 'Connection failed.');
    btn.textContent = 'Enter'; btn.disabled = false;
  }
}

function logout() {
  Object.values(rt).forEach(s => { if (s.animFrame) cancelAnimationFrame(s.animFrame); });
  Object.keys(rt).forEach(k => delete rt[k]);
  currentUser = null; currentPageId = null; pages = [];
  localStorage.removeItem('wheel_session');
  document.getElementById('login-username').value = '';
  document.getElementById('login-pin').value = '';
  document.getElementById('login-error').textContent = '';
  document.getElementById('login-screen').classList.add('visible');
  document.getElementById('appScreen').classList.remove('visible');
  document.getElementById('wheelGrid').innerHTML = '';
  closeSidebar();
}

async function checkSession() {
  const saved = localStorage.getItem('wheel_session');
  if (!saved) { document.getElementById('login-screen').classList.add('visible'); return; }
  document.getElementById('loading-screen').classList.add('visible');
  try {
    const snap = await getDoc(doc(db, 'wheel_users', saved));
    if (snap.exists()) {
      currentUser = saved;
      await showApp();
    } else {
      localStorage.removeItem('wheel_session');
      document.getElementById('login-screen').classList.add('visible');
    }
  } catch(e) {
    document.getElementById('login-screen').classList.add('visible');
  }
  document.getElementById('loading-screen').classList.remove('visible');
}

/* ═══════════════════ FIRESTORE DATA ═══════════════════ */
async function loadPages() {
  try {
    const snap = await getDoc(doc(db, 'wheel_users', currentUser, 'data', 'pages'));
    if (snap.exists()) {
      pages = snap.data().list || [];
    } else {
      pages = [makePage('Page 1')];
      await savePages();
    }
  } catch(e) {
    console.error('loadPages error', e);
    pages = [makePage('Page 1')];
  }
}

async function savePages() {
  try {
    await setDoc(doc(db, 'wheel_users', currentUser, 'data', 'pages'), { list: pages });
  } catch(e) { console.error('savePages error', e); }
}

/* ═══════════════════ APP ENTRY ═══════════════════ */
async function showApp() {
  document.getElementById('loading-screen').classList.add('visible');
  await loadPages();
  document.getElementById('login-screen').classList.remove('visible');
  document.getElementById('appScreen').classList.add('visible');
  document.getElementById('sbUsername').textContent = '@' + currentUser;
  currentPageId = pages.length ? pages[0].id : null;
  renderSidebar();
  renderPage();
  document.getElementById('loading-screen').classList.remove('visible');
}

/* ═══════════════════ SIDEBAR ═══════════════════ */
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}
function renderSidebar() {
  const list = document.getElementById('pageList');
  list.innerHTML = '';
  pages.forEach(p => {
    const el = document.createElement('div');
    el.className = 'page-item' + (p.id === currentPageId ? ' active' : '');

    const icon = document.createElement('span'); icon.className = 'page-icon'; icon.textContent = '📋';

    // Name — double-click to rename inline
    const name = document.createElement('span'); name.className = 'page-name'; name.textContent = p.name || 'Untitled';
    name.title = 'Double-click to rename';
    name.addEventListener('dblclick', (e) => {
      e.stopPropagation();
      const inp = document.createElement('input');
      inp.className = 'page-rename-inp';
      inp.value = p.name || '';
      inp.maxLength = 40;
      name.replaceWith(inp);
      inp.focus(); inp.select();
      const commit = async () => {
        const val = inp.value.trim() || 'Untitled';
        p.name = val; await savePages();
        inp.replaceWith(name); name.textContent = val;
        if (p.id === currentPageId) document.getElementById('pageTitle').value = val;
        renderSidebar();
      };
      inp.addEventListener('blur', commit);
      inp.addEventListener('keydown', e => { if (e.key === 'Enter') inp.blur(); if (e.key === 'Escape') { inp.replaceWith(name); } });
    });

    // Rename pencil button
    const renameBtn = document.createElement('button'); renameBtn.className = 'page-rename-btn'; renameBtn.title = 'Rename'; renameBtn.textContent = '✎';
    renameBtn.addEventListener('click', (e) => { e.stopPropagation(); name.dispatchEvent(new MouseEvent('dblclick', { bubbles: true })); });

    const del = document.createElement('button'); del.className = 'page-del'; del.textContent = '×';
    del.addEventListener('click', e => { e.stopPropagation(); deletePage(p.id); });

    el.appendChild(icon); el.appendChild(name); el.appendChild(renameBtn); el.appendChild(del);
    el.addEventListener('click', () => { switchPage(p.id); closeSidebar(); });
    list.appendChild(el);
  });
}

/* ═══════════════════ PAGES ═══════════════════ */
function uid() { return Math.random().toString(36).slice(2, 9); }
function makePage(name = 'New Page') {
  return { id: uid(), name, wheels: [makeWheel('Wheel 1', ['Option A','Option B','Option C','Option D'])] };
}
async function createPage() {
  const p = makePage(`Page ${pages.length + 1}`);
  pages.push(p);
  await savePages();
  switchPage(p.id); closeSidebar();
  setTimeout(() => document.getElementById('pageTitle').select(), 50);
}
async function deletePage(id) {
  pages = pages.filter(p => p.id !== id);
  if (!pages.length) pages = [makePage('Page 1')];
  await savePages();
  if (currentPageId === id) currentPageId = pages[0].id;
  renderSidebar(); renderPage();
}
function switchPage(id) {
  Object.values(rt).forEach(s => { if (s.animFrame) cancelAnimationFrame(s.animFrame); });
  Object.keys(rt).forEach(k => delete rt[k]);
  currentPageId = id; renderSidebar(); renderPage();
}
async function onPageTitleChange() {
  const val = document.getElementById('pageTitle').value;
  const p = pages.find(p => p.id === currentPageId);
  if (p) { p.name = val; await savePages(); renderSidebar(); }
}
function getCurrentPage() { return pages.find(p => p.id === currentPageId) || null; }
function getWheels() { return getCurrentPage()?.wheels || []; }
async function saveWheels(wheels) {
  const p = pages.find(p => p.id === currentPageId);
  if (p) { p.wheels = wheels; await savePages(); }
}

/* ═══════════════════ WHEELS ═══════════════════ */
function makeWheel(name = 'New Wheel', items = []) { return { id: uid(), name, items }; }
async function addPresetWheel(type) {
  const wheels = getWheels();
  if (wheels.length >= MAX_WHEELS) return;

  const KEYS = [
    'C major - A minor',
    'G major - E minor',
    'D major - B minor',
    'A major - F♯ minor',
    'E major - C♯ minor',
    'B major - G♯ minor',
    'F♯ major - D♯ minor',
    'C♯ major - A♯ minor',
    'F major - D minor',
    'B♭ major - G minor',
    'E♭ major - C minor',
    'A♭ major - F minor',
  ];
  const MAJOR = ['C','G','D','A','E','B','F♯','C♯','F','B♭','E♭','A♭'];
  const MINOR = ['A','E','B','F♯','C♯','G♯','D♯','A♯','D','G','C','F'];

  const presets = {
    keys:  { name: 'All Keys',  items: KEYS },
    major: { name: 'All Major', items: MAJOR.map(k => k + ' major') },
    minor: { name: 'All Minor', items: MINOR.map(k => k + ' minor') },
  };
  const p = presets[type];
  wheels.push(makeWheel(p.name, p.items));
  await saveWheels(wheels);
  renderGrid();
}
window.addPresetWheel = addPresetWheel;
async function addWheel() {
  const wheels = getWheels();
  if (wheels.length >= MAX_WHEELS) return;
  wheels.push(makeWheel(`Wheel ${wheels.length + 1}`));
  await saveWheels(wheels); renderGrid();
  const names = document.querySelectorAll('.card-name');
  names[names.length - 1]?.select();
}
async function removeWheel(id) {
  if (rt[id]?.animFrame) cancelAnimationFrame(rt[id].animFrame);
  delete rt[id];
  const wheels = getWheels().filter(w => w.id !== id);
  await saveWheels(wheels.length ? wheels : [makeWheel('Wheel 1')]); renderGrid();
}

/* ═══════════════════ PAGE RENDER ═══════════════════ */
function renderPage() {
  const page = getCurrentPage();
  document.getElementById('emptyState').hidden = !!page;
  document.getElementById('pageContent').hidden = !page;
  if (!page) { document.getElementById('pageTitle').value = ''; return; }
  document.getElementById('pageTitle').value = page.name;
  renderGrid();
}
function renderGrid() {
  const wheels = getWheels();
  const grid = document.getElementById('wheelGrid');
  grid.innerHTML = '';
  grid.dataset.count = Math.max(wheels.length, 1);
  wheels.forEach(w => {
    rt[w.id] = rt[w.id] || { angle: 0, spinning: false, animFrame: null };
    grid.appendChild(buildCard(w));
  });
  document.getElementById('addWheelBtn').disabled = wheels.length >= MAX_WHEELS;
  document.querySelectorAll('.preset-btn').forEach(b => b.disabled = wheels.length >= MAX_WHEELS);
  updateSpinBtn();
}

/* ═══════════════════ SPIN ALL ═══════════════════ */
function updateSpinBtn() {
  document.getElementById('spinAllBtn').disabled = Object.values(rt).some(s => s.spinning);
}
function spinAll() {
  const wheels = getWheels();
  if (!wheels.length || Object.values(rt).some(s => s.spinning)) return;
  // Clear previous results
  document.querySelectorAll('.card-result').forEach(el => el.textContent = '');
  document.querySelectorAll('.wheel-result-overlay').forEach(el => el.classList.remove('visible'));
  const t0 = performance.now();
  wheels.forEach(w => spinWheel(w, t0));
  updateSpinBtn();
}
function spinWheel(w, t0) {
  const state = rt[w.id];
  if (!state || state.spinning) return;
  const canvas = document.querySelector(`.wheel-card[data-id="${w.id}"] .wheel-canvas`);
  const resultEl = document.querySelector(`.wheel-card[data-id="${w.id}"] .card-result`);
  const overlay = document.querySelector(`.wheel-card[data-id="${w.id}"] .wheel-result-overlay`);
  const bubble = overlay?.querySelector('.wheel-result-bubble');
  if (!canvas) return;
  state.spinning = true;
  overlay?.classList.remove('visible');
  const totalRot = (4 + Math.random() * 3) * Math.PI * 2 + Math.random() * Math.PI * 2;
  const duration = 3800 + Math.random() * 800;
  const startAngle = state.angle;
  const items = [...w.items];
  function easeOut(t) { return 1 - Math.pow(1 - t, 4); }
  function animate(now) {
    const progress = Math.min((now - t0) / duration, 1);
    state.angle = startAngle + totalRot * easeOut(progress);
    drawOnCanvas(canvas, items, state.angle);
    if (progress < 1) {
      state.animFrame = requestAnimationFrame(animate);
    } else {
      state.spinning = false; state.animFrame = null;
      if (items.length) {
        const arc = (Math.PI * 2) / items.length;
        const rel = ((-Math.PI / 2 - state.angle) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2);
        const winner = items[Math.floor(rel / arc) % items.length];
        if (resultEl) resultEl.textContent = winner;
        if (bubble) bubble.textContent = winner;
        if (overlay) overlay.classList.add('visible'); // show overlay
      }
      updateSpinBtn();
    }
  }
  state.animFrame = requestAnimationFrame(animate);
}

/* ═══════════════════ CARD ═══════════════════ */
function buildCard(w) {
  const card = document.createElement('div');
  card.className = 'wheel-card'; card.dataset.id = w.id;
  const header = document.createElement('div'); header.className = 'card-header';
  const nameInp = document.createElement('input'); nameInp.type = 'text'; nameInp.className = 'card-name';
  nameInp.value = w.name; nameInp.maxLength = 32; nameInp.placeholder = 'Wheel name';
  nameInp.addEventListener('input', async () => {
    const wheels = getWheels(); const i = wheels.findIndex(x => x.id === w.id);
    if (i !== -1) { wheels[i].name = nameInp.value; await saveWheels(wheels); }
  });
  const editBtn = document.createElement('button'); editBtn.className = 'card-edit-btn'; editBtn.textContent = 'Edit Items';
  const delBtn = document.createElement('button'); delBtn.className = 'card-del-btn'; delBtn.title = 'Remove'; delBtn.textContent = '×';
  delBtn.addEventListener('click', () => removeWheel(w.id));
  header.appendChild(nameInp); header.appendChild(editBtn); header.appendChild(delBtn);
  const canvasWrap = document.createElement('div'); canvasWrap.className = 'card-canvas-wrap';
  const wheelWrap = document.createElement('div'); wheelWrap.className = 'wheel-wrap';
  const pointer = document.createElement('div'); pointer.className = 'pointer-arrow';
  const canvas = document.createElement('canvas'); canvas.className = 'wheel-canvas'; canvas.width = 500; canvas.height = 500;
  wheelWrap.appendChild(pointer); wheelWrap.appendChild(canvas);
  const resultOverlay = document.createElement('div'); resultOverlay.className = 'wheel-result-overlay';
  const resultBubble = document.createElement('div'); resultBubble.className = 'wheel-result-bubble';
  resultOverlay.appendChild(resultBubble); wheelWrap.appendChild(resultOverlay);
  resultOverlay.addEventListener('click', () => resultOverlay.classList.remove('visible'));
  const resultEl = document.createElement('div'); resultEl.className = 'card-result';
  canvasWrap.appendChild(wheelWrap); canvasWrap.appendChild(resultEl);
  const itemsPanel = document.createElement('div'); itemsPanel.className = 'card-items'; itemsPanel.hidden = true;
  const addRow = document.createElement('div'); addRow.className = 'add-row';
  const addInp = document.createElement('input'); addInp.type = 'text'; addInp.placeholder = 'Add an item…'; addInp.maxLength = 24;
  const addBtn = document.createElement('button'); addBtn.textContent = 'Add';
  addRow.appendChild(addInp); addRow.appendChild(addBtn);
  const itemList = document.createElement('div'); itemList.className = 'item-list';
  itemsPanel.appendChild(addRow); itemsPanel.appendChild(itemList);
  editBtn.addEventListener('click', () => {
    const open = !itemsPanel.hidden; itemsPanel.hidden = open;
    editBtn.classList.toggle('open', !open); editBtn.textContent = open ? 'Edit Items' : 'Done';
  });
  card.appendChild(header); card.appendChild(canvasWrap); card.appendChild(itemsPanel);

  // Always get the live wheel object from memory
  function liveWh() {
    const pg = pages.find(p => p.id === currentPageId);
    return pg ? pg.wheels.find(x => x.id === w.id) : null;
  }

  // Redraw canvas from live items
  function redraw() {
    const wh = liveWh();
    drawOnCanvas(canvas, wh ? wh.items : [], rt[w.id]?.angle || 0);
  }

  // Rebuild the item list DOM from live items (fresh closures each time = correct indices)
  function renderItemRows() {
    const wh = liveWh(); if (!wh) return;
    itemList.innerHTML = '';
    wh.items.forEach((item, i) => {
      const row = document.createElement('div'); row.className = 'item-row';
      const dot = document.createElement('div'); dot.className = 'item-dot'; dot.style.background = COLORS[i % COLORS.length];
      const inp = document.createElement('input'); inp.className = 'item-inp'; inp.type = 'text'; inp.value = item; inp.maxLength = 24;
      inp.addEventListener('input', () => {
        const wh2 = liveWh(); if (!wh2) return;
        wh2.items[i] = inp.value;
        redraw(); savePages();
      });
      const del = document.createElement('button'); del.className = 'item-del'; del.textContent = '×';
      del.addEventListener('click', () => {
        const wh2 = liveWh(); if (!wh2) return;
        wh2.items.splice(i, 1);
        redraw();         // wheel updates instantly
        renderItemRows(); // list rebuilds with correct fresh indices
        savePages();
      });
      row.appendChild(dot); row.appendChild(inp); row.appendChild(del); itemList.appendChild(row);
    });
  }

  function syncItems() { renderItemRows(); redraw(); }

  function doAdd() {
    const val = addInp.value.trim(); if (!val) return;
    const wh = liveWh(); if (!wh) return;
    wh.items.push(val); addInp.value = '';
    redraw();         // wheel updates instantly
    renderItemRows(); // list updates instantly
    savePages();
  }
  addBtn.addEventListener('click', doAdd);
  addInp.addEventListener('keydown', e => { if (e.key === 'Enter') doAdd(); });
  syncItems();
  return card;
}

/* ═══════════════════ DRAW ═══════════════════ */
function drawOnCanvas(canvas, items, angle) {
  const ctx = canvas.getContext('2d');
  const cx = canvas.width / 2, cy = canvas.height / 2, r = cx - 14, n = items.length;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (n === 0) {
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fillStyle = '#e5e5ea'; ctx.fill();
    ctx.fillStyle = '#aeaeb2'; ctx.font = '22px -apple-system, sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('No items yet', cx, cy); return;
  }
  const arc = (Math.PI * 2) / n;
  for (let i = 0; i < n; i++) {
    const start = angle + i * arc, end = start + arc;
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.arc(cx, cy, r, start, end); ctx.closePath();
    ctx.fillStyle = COLORS[i % COLORS.length]; ctx.fill();
    ctx.strokeStyle = 'white'; ctx.lineWidth = 4; ctx.stroke();
    ctx.save(); ctx.translate(cx, cy); ctx.rotate(start + arc / 2);
    const label = items[i].length > 14 ? items[i].slice(0, 14) + '…' : items[i];
    const fontSize = Math.min(34, Math.max(16, Math.floor(240 / Math.max(n, 2))));
    ctx.font = `600 ${fontSize}px -apple-system, sans-serif`; ctx.fillStyle = '#2c2c2e';
    ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(255,255,255,0.85)'; ctx.shadowBlur = 5;
    ctx.fillText(label, r - 18, 0); ctx.restore();
  }
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.strokeStyle = 'white'; ctx.lineWidth = 6; ctx.stroke();
  ctx.beginPath(); ctx.arc(cx, cy, 22, 0, Math.PI * 2); ctx.fillStyle = 'white'; ctx.fill();
  ctx.strokeStyle = '#e5e5ea'; ctx.lineWidth = 2; ctx.stroke();
}

/* ═══════════════════ INIT ═══════════════════ */
document.getElementById('login-pin').addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
document.getElementById('login-username').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('login-pin').focus(); });
document.getElementById('appScreen').style.display = '';

// Expose globals needed for inline onclick
window.handleLogin = handleLogin;
window.logout = logout;
window.createPage = createPage;
window.addWheel = addWheel;
window.spinAll = spinAll;
window.toggleSidebar = toggleSidebar;
window.closeSidebar = closeSidebar;
window.onPageTitleChange = onPageTitleChange;

checkSession();
</script>
